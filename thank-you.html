<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You! - BuildClarity</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://buildclarity.in/thank-you.html">
    <link rel="icon" type="image/png" href="images/favicon-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FFF9F2;
            padding: 20px;
            text-align: center;
        }
        .thank-you-container {
            max-width: 500px;
            background: white;
            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .checkmark {
            width: 80px;
            height: 80px;
            background: #27AE60;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 40px;
        }
        h1 {
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 15px;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.7;
            margin-bottom: 10px;
        }
        .highlight-box {
            background: #FFF5EB;
            border-left: 4px solid #E67E22;
            padding: 15px 20px;
            border-radius: 8px;
            margin: 25px 0;
            text-align: left;
        }
        .highlight-box strong {
            color: #E67E22;
        }
        .btn-home {
            display: inline-block;
            background: #1a1a2e;
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            margin-top: 15px;
            transition: background 0.3s;
        }
        .btn-home:hover { background: #E67E22; }
        .btn-whatsapp {
            display: inline-block;
            background: #25D366;
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            margin-top: 10px;
            transition: transform 0.3s;
        }
        .btn-whatsapp:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="thank-you-container">
        <div class="checkmark">✅</div>
        <h1>Thank You! 🎉</h1>
        <p>Your home plan inquiry has been received successfully.</p>
        
        <div class="highlight-box">
            <p><strong>What happens next?</strong></p>
            <p>📞 Our civil engineer will contact you within <strong>2 hours</strong> during business hours (9 AM - 6 PM).</p>
        </div>

        <p>Need instant help? Chat with us directly:</p>
        
        <!-- Replace with your WhatsApp number -->
        <a href="https://wa.me/91XXXXXXXXXX?text=Hi!%20I%20just%20submitted%20a%20form%20on%20BuildClarity.%20Need%20help%20with%20my%20home%20plan." class="btn-whatsapp" target="_blank">
            💬 Chat on WhatsApp
        </a>
        <br>
        <a href="https://buildclarity.in/" class="btn-home">
            ← Back to Home
        </a>
    </div>
</body>
</html>
